# CASA Tier 2/3 için nginx ayarları
# apply2campus.com için mevcut server bloğunuzun İÇİNE (location / { } öncesi veya içinde) ekleyin.
# Tam server bloğu örneği aşağıda.

# ---------- Sadece eklemeniz gereken satırlar (mevcut server {} içine) ----------
# Sürüm bilgisini kapat (Server: nginx/1.18.0 -> Server: nginx)
server_tokens off;

# TRACE ve TRACK metodlarını reddet (Proxy Disclosure - CASA #1)
if ($request_method ~ ^(TRACE|TRACK)$) {
    return 405;
}

# Backend'den gelen X-Powered-By header'ını istemciye gönderme
proxy_hide_header X-Powered-By;

# NOT: Server header'ını tamamen kaldırmak için ngx_headers_more modülü gerekir.
# Sadece "server_tokens off;" ile sürüm numarası gizlenir (yeterli kabul edilebilir).

